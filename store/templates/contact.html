{% extends 'base.html' %}

{% block content %}
<div class="container animate-up">
    <h1 class="section-title">Get in Touch</h1>
    <div class="grid-4" style="grid-template-columns: 1fr 1fr;">
        <div class="card">
            <h3>Send us a message</h3>
            <form style="margin-top: 1.5rem;">
                <div class="input-group">
                    <label>Name</label>
                    <input type="text">
                </div>
                <div class="input-group">
                    <label>Message</label>
                    <textarea rows="5"></textarea>
                </div>
                <button class="btn-full">Send Message</button>
            </form>
        </div>
        <div class="card" style="background: var(--secondary); color: white;">
            <h3>Contact Info</h3>
            <div style="margin-top: 2rem; display: flex; flex-direction: column; gap: 1.5rem;">
                <p><i class="fas fa-map-marker-alt" style="color: var(--primary);"></i> Salaga-Kpandai road, Kpandai</p>
                <p><i class="fas fa-phone" style="color: var(--primary);"></i> +233 54 9945 124</p>
                <p><i class="fas fa-envelope" style="color: var(--primary);"></i> support@namubirx.com</p>
            </div>
            <!-- Embedded Map -->
            <div style="margin-top: 2rem; border-radius: 10px; overflow: hidden;">
                <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d254332.61066804564!2d-0.2838382!3d5.5912087!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0xfdf9084b2b7a773%3A0xbed14ed8650e2dd3!2sAccra!5e0!3m2!1sen!2sgh!4v1645555555555" width="100%" height="200" style="border:0;" allowfullscreen="" loading="lazy"></iframe>
            </div>
        </div>
    </div>
</div>
{% endblock %}
