{% extends 'base.html' %}
{% block content %}
<div class="container" style="text-align: center; padding: 5rem 0;">
    <div style="background: white; padding: 3rem; border-radius: 20px; display: inline-block; box-shadow: 0 10px 30px rgba(0,0,0,0.1);">
        <i class="fas fa-check-circle" style="font-size: 5rem; color: #10B981; margin-bottom: 1rem;"></i>
        <h2 style="color: #10B981;">Payment Successful!</h2>
        <p style="color: #64748b; margin-bottom: 2rem;">Your order has been received and is being processed.</p>
        <a href="{% url 'shop' %}" class="nav-btn">Continue Shopping</a>
    </div>
</div>
{% endblock %}
